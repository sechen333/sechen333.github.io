<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Serena Chen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e2e8f0; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-text { color: #00F2FF; text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        .gradient-bg { background: radial-gradient(circle at top right, #0f172a, #050505); }
    </style>
</head>
<body class="gradient-bg">

    <nav class="fixed w-full z-50 px-8 py-6 glass flex justify-between items-center">
        <div class="font-extrabold text-2xl tracking-tighter uppercase"><a href="index.html">Serena <span class="neon-text">Chen</span></a></div>
        <div class="hidden md:flex space-x-10 text-xs font-bold uppercase tracking-[0.2em] text-slate-400 items-center">
            <a href="about.html" class="hover:text-cyan-400 transition">About</a>
            <a href="experience.html" class="hover:text-cyan-400 transition">Experience</a>
            <a href="credentials.html" class="hover:text-cyan-400 transition">Credentials</a>
            <a href="contact.html" class="text-cyan-400 transition">Contact</a>
        </div>
    </nav>

    <main class="pt-48 pb-20 px-10 md:px-32 max-w-4xl mx-auto text-center">
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-8 uppercase">Let's <span class="neon-text">Connect.</span></h1>
        <p class="text-slate-400 text-lg mb-12 max-w-2xl mx-auto">
            Whether it's a deep-dive on technical governance or a conversation about the future of autonomy, I'm always open to connecting with fellow innovators.
        </p>

        <div class="glass p-12 rounded-3xl text-left border border-white/10 shadow-2xl">
            <form action="https://formspree.io/f/mqedrowj" method="POST" class="space-y-8">
                <div class="grid md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-[10px] uppercase tracking-[0.3em] text-slate-500 mb-3 font-bold">Your Identity</label>
                        <input type="text" name="name" placeholder="Name" required class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-cyan-500 transition placeholder:text-slate-700">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase tracking-[0.3em] text-slate-500 mb-3 font-bold">Return Address</label>
                        <input type="email" name="email" placeholder="Email" required class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-cyan-500 transition placeholder:text-slate-700">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-[0.3em] text-slate-500 mb-3 font-bold">The Intent</label>
                    <textarea name="message" rows="5" placeholder="Your inquiry or collaborative proposal..." required class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-cyan-500 transition placeholder:text-slate-700"></textarea>
                </div>
                <button type="submit" class="w-full py-5 rounded-xl border border-cyan-500/30 font-bold uppercase tracking-widest text-xs neon-text hover:bg-cyan-500/10 transition duration-500">
                    Send Inquiry
                </button>
            </form>
        </div>
    </main>
</body>
</html>
