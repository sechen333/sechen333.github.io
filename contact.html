<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Serena Chen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-text { color: #00F2FF; text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
    </style>
</head>
<body class="bg-[#050505]">

    <nav class="fixed w-full z-50 px-8 py-6 glass flex justify-between items-center">
        <div class="font-extrabold text-2xl tracking-tighter uppercase">
            <a href="index.html">Serena <span class="neon-text">Chen</span></a>
        </div>
        <div class="hidden md:flex space-x-10 text-xs font-bold uppercase tracking-[0.2em] text-slate-400 items-center">
            <a href="index.html" class="hover:text-cyan-400 transition">Home</a>
            <a href="about.html" class="hover:text-cyan-400 transition">About</a>
            <a href="experience.html" class="hover:text-cyan-400 transition">Experience</a>
            <a href="credentials.html" class="hover:text-cyan-400 transition">Credentials</a>
            <a href="contact.html" class="text-cyan-400">Contact</a>
            <a href="https://www.linkedin.com/in/serenachen575104/" target="_blank" class="hover:text-cyan-400 transition">
                <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
            </a>
        </div>
    </nav>

    <main class="pt-36 pb-20 px-10 md:px-32 max-w-6xl mx-auto">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-8 uppercase leading-none text-center">Let's <span class="neon-text">Connect.</span></h1>
            <p class="text-slate-400 text-lg mb-12 max-w-2xl mx-auto text-center">
                Whether it's a deep-dive on technical governance or a conversation about the future of autonomy, I'm always open to connecting with fellow innovators.
            </p>

            <div class="glass p-12 rounded-3xl text-left border border-white/10">
                <form action="https://formspree.io/f/mqedrowj" method="POST" class="space-y-8">
                    <div class="grid md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-slate-500 mb-3 font-bold">Your Name</label>
                            <input type="text" name="name" placeholder="Name" required class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-cyan-500 transition placeholder:text-slate-700">
                        </div>
                        <div>
                            <label class="block text-xs uppercase tracking-widest text-slate-500 mb-3 font-bold">Your Email</label>
                            <input type="email" name="email" placeholder="Email" required class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-cyan-500 transition placeholder:text-slate-700">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-widest text-slate-500 mb-3 font-bold">Message</label>
                        <textarea name="message" rows="5" placeholder="Your inquiry or collaborative proposal..." required class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-cyan-500 transition placeholder:text-slate-700"></textarea>
                    </div>
                    <button type="submit" class="w-full py-5 rounded-xl border border-cyan-500/30 font-bold uppercase tracking-widest text-xs neon-text hover:bg-cyan-500/10 transition">
                        Send Message
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center border-t border-white/5 text-[10px] uppercase tracking-[0.3em] text-slate-600">
        &copy; 2026 Serena Chen — Contact
    </footer>

</body>
</html>
